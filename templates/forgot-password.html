{% extends "base.html" %}
{% block title %}Forgot Password - BloodBank{% endblock %}

{% block content %}
<div class="container-lg py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-danger-subtle text-danger rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 60px; height: 60px; font-size: 1.5rem;">
                            <i class="fas fa-key"></i>
                        </div>
                        <h3 class="fw-bold">Forgot Password?</h3>
                        <p class="text-muted small">Enter your registered email address and we'll send you a secure link to reset your password.</p>
                    </div>

                    <form method="POST">
                        <div class="mb-4">
                            <label for="email" class="form-label text-muted fw-bold small mb-1">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 ps-0 bg-light" id="email" name="email" required placeholder="name@example.com" value="{{ global_user.email if global_user else '' }}">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-red w-100 py-2 fw-bold mb-3 shadow-sm hover-lift">
                            Send Reset Link
                        </button>
                        
                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-decoration-none text-muted small hover-danger">
                                <i class="fas fa-arrow-left me-1"></i> Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
