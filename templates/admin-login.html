<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - BloodBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a; /* Dark slate background */
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .admin-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
        }
        .form-control:focus {
            background-color: #0f172a;
            color: #f8fafc;
            border-color: #ef4444;
            box-shadow: 0 0 0 0.25rem rgba(239, 68, 68, 0.25);
        }
        .btn-danger {
            background-color: #e11d48;
            border: none;
        }
        .btn-danger:hover {
            background-color: #be123c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white"><i class="fas fa-heartbeat text-danger me-2"></i>BloodBank</h2>
                    <p class="text-secondary letter-spacing-1 text-uppercase small">Authorized Personnel Only</p>
                </div>

                <div class="card admin-card p-4 p-md-5">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} bg-transparent border-{{ category }} text-{{ category }} small py-2">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('admin.admin_login') }}">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Administrator Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary text-secondary"><i class="fas fa-user-shield"></i></span>
                                <!-- Changed 'email' to 'username' to match your auth setup -->
                                <input type="text" name="username" class="form-control border-start-0" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-bold">Security Passphrase</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary text-secondary"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control border-start-0" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">
                            Authenticate <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('auth.login') }}" class="text-secondary small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Return to Public Portal</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
