{% extends "base.html" %}
{% block title %}Reset Password - BloodBank{% endblock %}

{% block content %}
<div class="container-lg py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Set New Password</h3>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="password" class="form-label text-muted fw-bold small mb-1">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0 bg-light" id="password" name="password" required minlength="8">
                            </div>
                            <small class="text-muted mt-1 d-block"><i class="fas fa-info-circle me-1"></i>Must be at least 8 characters, with 1 uppercase, 1 lowercase, and 1 number.</small>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label text-muted fw-bold small mb-1">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 ps-0 bg-light" id="confirm_password" name="confirm_password" required minlength="8">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-red w-100 py-2 fw-bold shadow-sm hover-lift">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
