{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4 px-3 px-lg-4">
    <div class="row g-4 flex-column flex-lg-row">

        <!-- Unified Responsive Sidebar -->
        <div class="col-12 col-lg-2">
            <aside class="admin-sidebar bg-white rounded-4 shadow-sm p-3 sticky-lg-top" style="top: 85px; z-index: 10;">
                <ul class="nav flex-row flex-lg-column flex-nowrap overflow-x-auto pb-2 pb-lg-0 gap-2" style="scrollbar-width: none;">
                    
                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.dashboard' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.dashboard') }}">
                           <i class="fas fa-chart-pie me-2"></i> Dashboard
                        </a>
                    </li>
                    
                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.users' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.users') }}">
                           <i class="fas fa-users me-2"></i> Users
                        </a>
                    </li>
                    
                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.donors' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.donors') }}">
                           <i class="fas fa-heart-pulse me-2"></i> Donors
                        </a>
                    </li>
                    
                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.requests' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.requests') }}">
                           <i class="fas fa-file-alt me-2"></i> Requests
                        </a>
                    </li>
                    
                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.inventory' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.inventory') }}">
                           <i class="fas fa-warehouse me-2"></i> Inventory
                        </a>
                    </li>

                    <li class="nav-item flex-shrink-0">
                        <a class="nav-link rounded-3 px-3 py-2 {% if request.endpoint == 'admin.manage_slots' %}active text-danger fw-bold bg-danger-subtle{% else %}text-muted{% endif %}" 
                           href="{{ url_for('admin.manage_slots') }}">
                           <i class="fas fa-calendar-alt me-2"></i> Schedule Slots
                        </a>
                    </li>

                </ul>
            </aside>
        </div>

        <!-- Dynamic Main Content Injection -->
        <div class="col-12 col-lg-10">
            <main>
                {% block admin_content %}{% endblock %}
            </main>
        </div>

    </div>
</div>
{% endblock %}
